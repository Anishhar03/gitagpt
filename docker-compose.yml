x-backend-environment: &backend-environment
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://gitagpt:gitagpt@postgres:5432/gitagpt}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-me}
  AUTH_MODE: ${AUTH_MODE:-development}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
  GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
  ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@gitagpt.local}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-20}
  RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-6}
  CHUNK_SIZE: ${CHUNK_SIZE:-1200}
  CHUNK_OVERLAP: ${CHUNK_OVERLAP:-180}
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-20971520}
  INGESTION_MODE: ${INGESTION_MODE:-queue}
  UPLOAD_DIR: /data/uploads
  DEFAULT_PDF_PATH: /app/gita_book.pdf
  BACKGROUND_IMAGE_PATH: /app/krishna_ji.jpeg
  SEED_DEFAULT_DOCUMENT: ${SEED_DEFAULT_DOCUMENT:-true}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gitagpt
      POSTGRES_USER: gitagpt
      POSTGRES_PASSWORD: gitagpt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitagpt -d gitagpt"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  redis:
    image: redis:8.0-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  api:
    build: .
    command: ["sh", "entrypoint.sh", "api"]
    environment:
      <<: *backend-environment
      WEB_CONCURRENCY: "2"
    volumes:
      - uploads:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)"]
      interval: 5s
      timeout: 4s
      retries: 20
    restart: unless-stopped

  worker:
    build: .
    command: ["sh", "entrypoint.sh", "worker"]
    environment:
      <<: *backend-environment
    volumes:
      - uploads:/data/uploads
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
